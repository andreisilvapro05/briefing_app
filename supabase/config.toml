# ============================================================
# Supabase CLI · fysi-briefing
# Documentação: https://supabase.com/docs/guides/cli/config
#
# Use:
#   supabase login
#   supabase link --project-ref <SEU_PROJECT_REF>
#   supabase db push          # aplica as migrations no projeto remoto
#   supabase start            # sobe stack local (Postgres + Auth + Storage)
# ============================================================

# Project ref (substitua quando rodar "supabase link").
# Aparece no painel em "Project Settings" → Reference ID.
project_id = "fysi-briefing"

# ============================================================
# API
# ============================================================
[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ============================================================
# Database (rodando local)
# ============================================================
[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

# ============================================================
# Studio (UI local)
# ============================================================
[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# ============================================================
# Auth
# ============================================================
[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "https://briefing.fysilab.com/auth/callback",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false   # magic-link já confirma; sem dupla verificação
double_confirm_changes = true
secure_password_change = true

# Magic-link com OTP de 1h
otp_expiry = 3600
otp_length = 6

# Templates customizados — apontando pra arquivos com identidade Fysi
# (descomente quando criar os arquivos em supabase/templates)
# [auth.email.template.magic_link]
# subject = "Seu acesso · Fysi Lab"
# content_path = "./templates/magic_link.html"

# ============================================================
# Storage
# ============================================================
[storage]
enabled = true
file_size_limit = "25MiB"
image_transformation = { enabled = true }

# Bucket é criado pela migration (storage.buckets insert).

# ============================================================
# Realtime (não usamos no M1; mantido off por padrão)
# ============================================================
[realtime]
enabled = false

# ============================================================
# Inbucket (caixa de e-mail local — pra testar magic-link em dev)
# ============================================================
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

# ============================================================
# Edge Functions (não usamos por enquanto)
# ============================================================
[functions]
enabled = false

# ============================================================
# Analytics (opcional)
# ============================================================
[analytics]
enabled = false
